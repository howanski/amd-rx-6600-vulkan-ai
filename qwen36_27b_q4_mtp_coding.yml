# HG: https://huggingface.co/froggeric/Qwen3.6-27B-MTP-GGUF
# Runs:
# n_decoded = 3758, tg = 3.38 t/s
# TODO: more runs, try spec-draft-n-max 2 and 4
services:
  local-ai:
    command: >
      --cache-type-k q8_0
      --cache-type-v q8_0
      --chat-template-kwargs '{"enable_thinking":true}'
      --ctx-size 150000
      --host 0.0.0.0
      --min-p 0.00
      --model /models/froggeric/Qwen3.6-27B-MTP-GGUF/Qwen3.6-27B-Q4_K_M-mtp.gguf
      --no-mmap
      --no-mmproj
      --parallel 1
      --port 8080
      --presence-penalty 0.0
      --seed 42
      --spec-draft-n-max 3
      --spec-draft-ngl all
      --spec-type draft-mtp
      --temp 0.6
      --threads 4
      --top-k 20
      --top-p 0.95
# --n_gpu_layers 99 slows it down