      --no-mmap
      --no-mmproj
      --parallel 1
      --port 8080
      --presence-penalty 0.0
      --seed 42
      --spec-draft-n-max 3
      --spec-draft-ngl all
      --spec-type draft-mtp
      --temp 0.6
      --threads 4
      --top-k 20
      --top-p 0.95
