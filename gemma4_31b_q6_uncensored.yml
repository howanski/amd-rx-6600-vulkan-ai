# HF: https://huggingface.co/llmfan46/gemma-4-31B-it-uncensored-heretic-GGUF
# TODO BENCHMARK
# TODO gpu layers ? +waiting for MTP implementation
services:
  local-ai:
    command: >
      --cache-type-k q8_0
      --cache-type-v q8_0
      --cpu-moe
      --ctx-size 200000
      --flash-attn on
      --host 0.0.0.0
      --min-p 0.05
      --model /models/llmfan46/gemma-4-31B-it-uncensored-heretic-GGUF/gemma-4-31B-it-uncensored-heretic-Q6_K.gguf
      --n_gpu_layers 6
      --no-mmap
      --no-mmproj
      --parallel 1
      --port 8080
      --presence-penalty 0.0
      --repeat-penalty 1.1
      --temp 1.0
      --threads 4
      --top-k 64
      --top-p 0.95
